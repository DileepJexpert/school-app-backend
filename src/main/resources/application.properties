# src/main/resources/application.properties

# -------------------------------------------------------
# MULTI-TENANT MONGODB CONFIGURATION
# -------------------------------------------------------
# The database name in this URI is used only as the default/fallback.
# At runtime, TenantAwareMongoDatabaseFactory resolves the actual
# database per request:  {tenantId}_db  (e.g., springfield_db, dps_rohini_db)
# Platform/super-admin data is always stored in:  platform_db
# -------------------------------------------------------
# SECURITY: never commit credentials here. Set MONGODB_URI as an environment variable:
#   export MONGODB_URI="mongodb+srv://<user>:<password>@<cluster>/platform_db?retryWrites=true&w=majority"
# The default below only works for a local unauthenticated MongoDB.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/platform_db}

#--------------------------------------------------
# MONGODB DATABASE CONFIGURATION
#--------------------------------------------------

# Option 1: Using a full URI (Recommended)
# Replace 'your_username', 'your_password', and 'your_database' with your actual credentials.
# The 'authSource=admin' part is crucial if your user is defined in the 'admin' database.
#spring.data.mongodb.uri=mongodb://your_username:your_password@localhost:27017/your_database?authSource=admin

# Option 2: Using individual properties (Less common)
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=your_database
# spring.data.mongodb.username=your_username
# spring.data.mongodb.password=your_password
# spring.data.mongodb.authentication-database=admin

# Alternatively, you can specify host, port, and database separately:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=school_fee_db

# If your MongoDB requires authentication, add username and password:
# spring.data.mongodb.username=your_mongo_user
# spring.data.mongodb.password=your_mongo_password
# spring.data.mongodb.authentication-database=admin # Or the db where the user is defined

# --- H2 Configuration (Commented out or Remove) ---
# spring.datasource.url=jdbc:h2:mem:feedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=false

# --- JPA / Hibernate Configuration (Commented out or Remove if not using JPA with MongoDB via OGM) ---
# spring.jpa.hibernate.ddl-auto=none # MongoDB manages schema more flexibly
# spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.format_sql=false

# Server port (optional, default is 8080)
# server.port=8081

# Logging level for MongoDB driver (optional, for debugging)
# logging.level.org.mongodb.driver=DEBUG
spring.data.mongodb.lazy-initialization=true

server.port=${PORT:8080}
server.address=0.0.0.0

# File upload limits (for tutorial video uploads)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# -------------------------------------------------------
# AI HOMEWORK HELPER — LOGGING
# -------------------------------------------------------
# Show all AI logs (INFO level shows everything you need)
logging.level.com.school.manage.service.AiHomeworkService=INFO
logging.level.com.school.manage.service.ai=INFO
# For even more detail (system prompts, full messages), set to DEBUG:
# logging.level.com.school.manage.service.AiHomeworkService=DEBUG
# logging.level.com.school.manage.service.ai=DEBUG

# -------------------------------------------------------
# WHATSAPP AI AGENT
# -------------------------------------------------------
# Webhook verification token (must match what you set in Meta dashboard)
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:school-whatsapp-verify-2024}
# Meta app secret — enables X-Hub-Signature-256 webhook verification (REQUIRED in production)
whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
# Show WhatsApp agent logs
logging.level.com.school.manage.service.WhatsAppService=INFO
logging.level.com.school.manage.controller.WhatsAppWebhookController=INFO

# -------------------------------------------------------
# RAZORPAY ONLINE FEE PAYMENTS
# -------------------------------------------------------
# Get these from your Razorpay dashboard (https://dashboard.razorpay.com).
# Until real keys are set, online payment stays disabled and the "Pay Now"
# button is hidden in the parent/student app.
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}
logging.level.com.school.manage.service.PaymentGatewayService=INFO
