# src/main/resources/application.properties

# -------------------------------------------------------
# MULTI-TENANT MONGODB CONFIGURATION
# -------------------------------------------------------
# The database name in this URI is used only as the default/fallback.
# At runtime, TenantAwareMongoDatabaseFactory resolves the actual
# database per request:  {tenantId}_db  (e.g., springfield_db, dps_rohini_db)
# Platform/super-admin data is always stored in:  platform_db
# -------------------------------------------------------
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://dileep:dileepkm@cluster0.z9llhfs.mongodb.net/platform_db?retryWrites=true&w=majority&appName=school-cluster}

# For local development with Docker Compose MongoDB:
# spring.data.mongodb.uri=${MONGODB_URI:mongodb://root:root@localhost:27017/platform_db?authSource=admin}

#--------------------------------------------------
# MONGODB DATABASE CONFIGURATION
#--------------------------------------------------

# Option 1: Using a full URI (Recommended)
# Replace 'your_username', 'your_password', and 'your_database' with your actual credentials.
# The 'authSource=admin' part is crucial if your user is defined in the 'admin' database.
#spring.data.mongodb.uri=mongodb://your_username:your_password@localhost:27017/your_database?authSource=admin

# Option 2: Using individual properties (Less common)
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=your_database
# spring.data.mongodb.username=your_username
# spring.data.mongodb.password=your_password
# spring.data.mongodb.authentication-database=admin

# Alternatively, you can specify host, port, and database separately:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=school_fee_db

# If your MongoDB requires authentication, add username and password:
# spring.data.mongodb.username=your_mongo_user
# spring.data.mongodb.password=your_mongo_password
# spring.data.mongodb.authentication-database=admin # Or the db where the user is defined

# --- H2 Configuration (Commented out or Remove) ---
